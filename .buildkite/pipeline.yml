steps:
  - label: "🏗️ Build & Unit Tests"
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$PATH"

      echo "--- Go environment"
      go version
      go env

      echo "--- Dependencies and linting"
      go mod tidy
      go vet ./...

      echo "--- Unit tests"
      export CGO_ENABLED=1
      go test -count=1 -race ./...

      echo "--- Build binary"
      go build -v ./...

  - label: "🔬 Cloud Hypervisor Integration Test"
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$PATH"

      echo "--- Verify Cloud Hypervisor binary"
      cloud-hypervisor --version

      echo "--- Check network bridge"
      ip link show ${BRIDGE:-br0} || (echo "Bridge ${BRIDGE:-br0} not found" && exit 1)

      echo "--- Verify test artifacts exist"
      ls -la ${KERNEL_PATH:-/root/vmlinux-normal}
      ls -la ${INITRD_PATH:-/root/raiin-fc.cpio.gz}
      ls -la ${ROOTFS_PATH:-/root/rootfs.img}

      echo "--- Integration tests"
      sudo -E env \
        PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$PATH" \
        CGO_ENABLED=1 \
        KERNEL_PATH="${KERNEL_PATH:-/root/vmlinux-normal}" \
        INITRD_PATH="${INITRD_PATH:-/root/raiin-fc.cpio.gz}" \
        ROOTFS_PATH="${ROOTFS_PATH:-/root/rootfs.img}" \
        CH_BIN="cloud-hypervisor" \
        BRIDGE="${BRIDGE:-br0}" \
        go test -v -count=1 ./...

  - label: "🚀 Release"
    if: 'build.tag != null'
    command: |
      set -euxo pipefail
      export PATH="/usr/local/bin:/usr/bin:/bin:/root/.local/bin:/root/.cargo/bin:/root/go/bin:/usr/local/go/bin:$PATH"

      echo "--- Building release binaries"
      export CGO_ENABLED=1

      # Build for Linux AMD64
      echo "Building for linux/amd64..."
      GOOS=linux GOARCH=amd64 go build -o nomad-driver-ch-linux-amd64 ./...


      echo "--- Creating release archives"
      tar -czf nomad-driver-ch-${BUILDKITE_TAG}-linux-amd64.tar.gz nomad-driver-ch-linux-amd64

      echo "--- Creating GitHub release"
      if ! command -v gh &> /dev/null; then
        echo "Installing GitHub CLI..."
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        apt update && apt install -y gh
      fi

      echo "--- Uploading release"
      gh release create "${BUILDKITE_TAG}" \
        --title "Release ${BUILDKITE_TAG}" \
        --notes "Release ${BUILDKITE_TAG} of nomad-driver-ch" \
        nomad-driver-ch-${BUILDKITE_TAG}-linux-amd64.tar.gz \

env:
  KERNEL_PATH: "/root/vmlinux-normal"
  INITRD_PATH: "/root/raiin-fc.cpio.gz"
  ROOTFS_PATH: "/root/rootfs.img"
  CH_BIN: "/usr/bin/cloud-hypervisor"
  BRIDGE: "br0"
  # GitHub token for releases - set this in Buildkite environment
  GITHUB_TOKEN: "${GITHUB_TOKEN}"

agents:
  # Run on the agent with Cloud Hypervisor capabilities
  queue: "default"
